# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# values/immich.yaml — Helm values for the immich-app/immich chart.
#
# Chart source: https://github.com/immich-app/immich-charts
# Full default values: helm show values immich/immich
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── Shared env (applied to all Immich components) ─────────────────────────────
controllers:
  main:
    containers:
      main:
        image:
          tag: v2.6.3
        env:
          # DB credentials sourced from the CNPG-generated secret.
          # CNPG creates "immich-db-app" automatically when the Cluster is applied.
          DB_HOSTNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-app
                key: host
          DB_PORT:
            valueFrom:
              secretKeyRef:
                name: immich-db-app
                key: port
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-app
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-db-app
                key: password
          DB_DATABASE_NAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-app
                key: dbname

# ── Library storage ───────────────────────────────────────────────────────────
# The library PVC must be pre-created before deploying the chart.
# Applied via: kubectl apply -f k8s/pvc.yaml
immich:
  persistence:
    library:
      existingClaim: immich-library

# ── Valkey (Redis-compatible cache) ───────────────────────────────────────────
valkey:
  enabled: true
  persistence:
    data:
      type: persistentVolumeClaim
      size: 1Gi
      storageClass: local-path

# ── Machine learning ──────────────────────────────────────────────────────────
machine-learning:
  enabled: true
  persistence:
    cache:
      enabled: true
      size: 10Gi
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: local-path
