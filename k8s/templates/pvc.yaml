# PersistentVolumeClaim for Immich's photo/video library.
# This must be applied before deploying the Helm chart because values/immich.yaml
# references it via immich.persistence.library.existingClaim.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-library
  namespace: ${NAMESPACE}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: ${LIBRARY_STORAGE_SIZE}
